<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Auth0 Simple Integration</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{
        font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
        min-height:100vh;display:flex;align-items:center;justify-content:center;color:#333
      }
      .container{
        background:#fff;padding:2rem;border-radius:14px;
        box-shadow:0 10px 30px rgba(0,0,0,.2);max-width:520px;width:94%;
        display:flex;flex-direction:column;gap:1rem
      }
      .logo{font-size:1.8rem;font-weight:800;color:#667eea}
      .config-warning{
        background:#fff3cd;border:1px solid #ffeaa7;color:#856404;
        padding:1rem;border-radius:10px;font-size:.9rem
      }
      .btn{
        background:#667eea;color:#fff;border:none;padding:10px 16px;border-radius:8px;
        cursor:pointer;font-size:.95rem;transition:.2s;margin-top:.25rem
      }
      .btn:hover{background:#5a67d8}
      .btn.secondary{background:#1118271a;color:#111827}
      .loading{display:inline-block;width:18px;height:18px;border:2px solid #f3f3f3;
        border-top:2px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin-right:6px}
      @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
      .user-avatar{width:52px;height:52px;border-radius:50%;border:3px solid #667eea}
      .kv{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.9rem}
      textarea{
        width:100%;min-height:90px;padding:.75rem;border-radius:10px;border:1px solid #e5e7eb;
        background:#fff;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.9rem;resize:vertical
      }
      .muted{color:#6b7280;font-size:.85rem}
      .row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
      .pill{display:inline-block;background:#eef2ff;color:#4f46e5;border:1px solid #e0e7ff;border-radius:999px;padding:.2rem .55rem;font-size:.75rem}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🔐 Auth0 Demo</div>

      <div id="config-warning" class="config-warning" style="display:none">
        <strong>Warning:</strong> Please update <code>auth0Config</code> below with your Auth0 Domain and Client ID.
      </div>

      <div id="loading" style="display:none"><span class="loading"></span>Initializing…</div>

      <div id="login-section" style="display:block">
        <p>Welcome! Please log in to continue.</p>
        <button id="login-btn" class="btn" disabled>Log In</button>
      </div>

      <div id="user-section" style="display:none">
        <div class="row">
          <img id="user-avatar" class="user-avatar" src="" alt="User Avatar" style="display:none"/>
          <span class="pill" id="auth-status" style="display:none">Authenticated</span>
        </div>
        <div id="user-details" class="kv"></div>
        <button id="logout-btn" class="btn secondary">Log Out</button>
      </div>

      <div id="token-card" style="display:none">
        <div class="row" style="justify-content:space-between;align-items:center">
          <strong style="color:#4f46e5">Access Token</strong>
          <span class="muted">From <code>getAccessTokenSilently</code></span>
        </div>
        <textarea id="access-token" readonly placeholder="access_token will appear here…"></textarea>
        <div class="row">
          <button id="copy-token" class="btn">Copy token</button>
          <button id="toggle-visibility" class="btn secondary">Hide token</button>
          <button id="refresh-token" class="btn secondary">Refresh token</button>
        </div>
        <div id="token-meta" class="kv muted"></div>
      </div>
    </div>

    <script src="https://unpkg.com/@auth0/auth0-spa-js@2.2.0/dist/auth0-spa-js.production.js"></script>
    <script>
      // ------------------ Auth0 Configuration (UPDATE THESE) ------------------
      const auth0Config = {
        domain: "dev-18oi7pqgotwgjxzf.us.auth0.com",
        clientId: "Se42bQZpKpp6CKUZMHWEfALLwfmBFWhz",
        authorizationParams: {
          redirect_uri: window.location.origin + "/samplelogin.html",
          // audience must be set to receive an API access token
          audience: "https://dev-18oi7pqgotwgjxzf.us.auth0.com/api/v2/",
          // include scopes as needed for your API
          scope: "openid profile email"
        },
        cacheLocation: "memory"
      };
      // -----------------------------------------------------------------------

      let auth0Client = null;

      // DOM refs
      const loginSection = document.getElementById("login-section");
      const userSection = document.getElementById("user-section");
      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const userAvatar = document.getElementById("user-avatar");
      const userDetails = document.getElementById("user-details");
      const loadingDiv = document.getElementById("loading");
      const configWarningDiv = document.getElementById("config-warning");
      const tokenCard = document.getElementById("token-card");
      const tokenTextarea = document.getElementById("access-token");
      const copyTokenBtn = document.getElementById("copy-token");
      const toggleVisibilityBtn = document.getElementById("toggle-visibility");
      const refreshTokenBtn = document.getElementById("refresh-token");
      const tokenMeta = document.getElementById("token-meta");
      const authStatusPill = document.getElementById("auth-status");

      // ------------------ UI helpers ------------------
      let tokenVisible = true;
      function renderToken(txt){
        if (!txt) { tokenTextarea.value = ""; return; }
        tokenTextarea.value = tokenVisible ? txt : (txt.length <= 12 ? "•••" : txt.slice(0,6) + "…" + txt.slice(-6));
      }
      async function copyToClipboard(text){
        try { await navigator.clipboard.writeText(text); }
        catch {
          const tmp = document.createElement("textarea");
          tmp.value = text; document.body.appendChild(tmp); tmp.select();
          try { document.execCommand("copy"); } finally { document.body.removeChild(tmp); }
        }
      }

      toggleVisibilityBtn.addEventListener("click", () => {
        tokenVisible = !tokenVisible;
        toggleVisibilityBtn.textContent = tokenVisible ? "Hide token" : "Show token";
        renderToken(tokenTextarea.dataset.raw || "");
      });
      copyTokenBtn.addEventListener("click", async () => {
        const raw = tokenTextarea.dataset.raw || "";
        if (raw) await copyToClipboard(raw);
      });
      refreshTokenBtn.addEventListener("click", async () => {
        await fetchAndShowToken(true);
      });

      // --- helper to decode a JWT payload safely (no verify, just decode) ---
      function decodeJwtPayload(token) {
        try {
          const parts = (token || "").split(".");
          if (parts.length !== 3) return null;
          const payload = JSON.parse(atob(parts[1].replace(/-/g, "+").replace(/_/g, "/")));
          return payload || null;
        } catch { return null; }
      }

      // ------------------ Auth flow ------------------
      async function showUserSection() {
        try {
          const user = await auth0Client.getUser();
          loginSection.style.display = "none";
          userSection.style.display = "block";
          authStatusPill.style.display = "inline-block";

          if (user.picture) {
            userAvatar.src = user.picture; userAvatar.style.display = "block";
          } else {
            userAvatar.style.display = "none";
          }

          userDetails.innerHTML = `
            <div><strong>Name:</strong> ${user.name || "-"}</div>
            <div><strong>Email:</strong> ${user.email || "-"}</div>
            <div><strong>Email Verified:</strong> ${user.email_verified ? "Yes" : "No"}</div>
            <div><strong>Sub:</strong> ${user.sub || "-"}</div>
          `;

          await fetchAndShowToken(false);
        } catch (error) {
          console.error("Error getting user data:", error);
          alert("Could not retrieve user data.");
          showLoginSection();
        }
      }

      function showLoginSection(){
        loginSection.style.display = "block";
        userSection.style.display = "none";
        tokenCard.style.display = "none";
      }

      // --------- Access Token retrieval (forces access_token, not id_token) ---------
      async function fetchAndShowToken(forceRefresh) {
        try {
          // Prefer explicit access-token method when available
          const getAccess = auth0Client.getAccessTokenSilently || auth0Client.getTokenSilently;

          let result = await getAccess.call(auth0Client, {
            detailedResponse: true,
            cacheMode: forceRefresh ? "off" : "on",
            authorizationParams: {
              audience: auth0Config.authorizationParams?.audience,
              scope: auth0Config.authorizationParams?.scope || "openid profile email"
            }
          });

          // Support both shapes (object vs string)
          let accessToken = "";
          let meta = {};
          if (typeof result === "string") {
            accessToken = result; // some SDKs return raw string if detailedResponse not honored
            meta = { token_type: "Bearer", scope: "", expires_in: "" };
          } else if (result && typeof result === "object") {
            accessToken = result.access_token || "";
            meta = {
              token_type: result.token_type || "Bearer",
              scope: result.scope || "",
              expires_in: result.expires_in || ""
            };
            // Fallback retry if we somehow only got an id_token back
            if (!accessToken && result.id_token) {
              const fallback = await getAccess.call(auth0Client, {
                cacheMode: forceRefresh ? "off" : "on",
                authorizationParams: {
                  audience: auth0Config.authorizationParams?.audience,
                  scope: auth0Config.authorizationParams?.scope || "openid profile email"
                }
              });
              if (typeof fallback === "string") accessToken = fallback;
            }
          }

          if (!accessToken) throw new Error("No access_token returned. Check audience/scopes.");

          // Heuristic warning if this looks like an ID token
          const payload = decodeJwtPayload(accessToken);
          const looksLikeIdToken = !!(payload && (payload.nonce || payload.email) && !meta.scope);
          const warnText = looksLikeIdToken
            ? " (warning: this looks like an ID token — check audience)"
            : "";

          tokenCard.style.display = "block";
          tokenTextarea.dataset.raw = accessToken;
          renderToken(accessToken);

          const expAt = meta.expires_in ? new Date(Date.now() + meta.expires_in * 1000) : null;
          tokenMeta.textContent =
            `type=${meta.token_type} | scope=${meta.scope || "-"} | ` +
            `expires_in=${meta.expires_in || "-"}s` +
            (expAt ? ` (~${expAt.toLocaleString()})` : "") +
            warnText;

        } catch (err) {
          tokenCard.style.display = "block";
          tokenTextarea.dataset.raw = "";
          renderToken("");
          tokenMeta.textContent = "Failed to get access_token. Verify API Audience and Allowed Web Origins.";
          console.error("fetchAndShowToken error:", err);
        }
      }

      // ------------------ Login/Logout ------------------
      async function login() {
        try {
          if (!auth0Client) { alert("Auth0 not initialized. Refresh and check config."); return; }
          loginBtn.disabled = true;
          loginBtn.innerHTML = '<span class="loading"></span>Logging in…';
          await auth0Client.loginWithRedirect();
        } catch (error) {
          console.error("Login error:", error);
          loginBtn.disabled = false; loginBtn.innerHTML = "Log In";
          alert("Login failed. See console for details.");
        }
      }
      async function logout() {
        try {
          if (!auth0Client) return;
          logoutBtn.disabled = true;
          logoutBtn.innerHTML = '<span class="loading"></span>Logging out…';
          await auth0Client.logout({ logoutParams: { returnTo: window.location.origin } });
        } catch (error) {
          console.error("Logout error:", error);
          logoutBtn.disabled = false; logoutBtn.innerHTML = "Log Out";
          alert("Logout failed. Please try again.");
        }
      }

      loginBtn.addEventListener("click", login);
      logoutBtn.addEventListener("click", logout);

      // ------------------ Init ------------------
      async function initAuth0() {
        try {
          loadingDiv.style.display = "block";
          loginBtn.disabled = true;

          if (
            auth0Config.domain.includes("YOUR_AUTH0_DOMAIN") ||
            auth0Config.clientId.includes("YOUR_AUTH0_CLIENT_ID")
          ) {
            console.error("Configuration not set! Update auth0Config with your actual Auth0 Domain and Client ID.");
            configWarningDiv.style.display = "block";
            return;
          }

          auth0Client = await auth0.createAuth0Client(auth0Config);

          const query = window.location.search;
          if (query.includes("code=") && query.includes("state=")) {
            await auth0Client.handleRedirectCallback();
            window.history.replaceState({}, document.title, window.location.pathname);
          }

          const isAuthenticated = await auth0Client.isAuthenticated();
          if (isAuthenticated) {
            await showUserSection();
          } else {
            showLoginSection();
          }
        } catch (error) {
          console.error("Auth0 initialization error:", error);
          configWarningDiv.style.display = "block";
          alert("Authentication initialization failed. Check configuration and network. Details in console.");
        } finally {
          loadingDiv.style.display = "none";
          if (configWarningDiv.style.display === "none") loginBtn.disabled = false;
        }
      }

      window.addEventListener("load", initAuth0);
    </script>
  </body>
</html>
